---
- name: Provision PHP 5 Stack
  hosts: all
  become: yes
  tasks:
    - name: Install Packages
      apt: 
        pkg: [apache2, nginx, mysql-server, php5-fpm, php5-mysql, 
php5-xdebug, redis-server, proftpd-basic, ufw, fail2ban]
        update_cache: yes

    - name: Configure Xdebug 2 for PHP 5
      copy:
        dest: /etc/php5/fpm/conf.d/20-xdebug.ini
        content: |
          zend_extension=xdebug.so
          xdebug.remote_enable=1
          xdebug.remote_autostart=1
          xdebug.remote_host=192.168.33.1
          xdebug.remote_port=9000

    - name: Setup Nginx Reverse Proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              location / { proxy_pass http://127.0.0.1:8080; }
              location ~ \.php$ { include snippets/fastcgi-php.conf; 
fastcgi_pass unix:/var/run/php5-fpm.sock; }
          }
      notify: restart services

    - name: Apache to Port 8080
      lineinfile: { path: /etc/apache2/ports.conf, regexp: '^Listen 80', 
line: 'Listen 8080' }
      notify: restart services

  handlers:
    - name: restart services
      service: { name: "{{ item }}", state: restarted }
      with_items: [nginx, apache2, php5-fpm]
